specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Nutanix
providerId: nutanix
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Management
  - Hyperconverged
  - Infrastructure
  - Virtualization
  - Kubernetes
  - Database
description: Nutanix is sold as licensed software bundled with on-prem clusters or as Nutanix Cloud Clusters
  (NC2) on AWS/Azure. APIs (Prism Central v3/v4, Prism Element v2, Karbon, NDB, NC2, NCM Self-Service,
  Foundation) are included with the underlying license; there is no separate API-tier pricing. Licensing
  is delivered as Nutanix Cloud Infrastructure (NCI), Nutanix Cloud Manager (NCM), Nutanix Unified Storage
  (NUS), and Nutanix Database Service (NDB) editions, sold per-node or per-CPU-core via Nutanix sales
  and channel partners. Public list prices are not published. A 90-day free trial is available for evaluation.
notes: Nutanix does not publish list pricing on its public website; all commercial pricing is custom-quoted
  via sales/channel. Free trial available. Update once Nutanix exposes a self-serve pricing tier.
sources:
  - https://www.nutanix.com/products/cloud-platform
  - https://www.nutanix.com/products/cloud-clusters
  - https://www.nutanix.com/products/cloud-infrastructure
plans:
  - id: nutanix-trial
    name: 90-Day Trial / Test Drive
    type: freemium
    description: Free 90-day evaluation license available via Nutanix Test Drive (CE / hosted lab) or
      partner request. Covers Prism Central, infrastructure APIs, and selected services.
    entries:
      - label: Trial license
        name: trial
        type: subscription
        metric: cluster
        limit: 1
        timeFrame: usage
        geo: global
        domains:
          - https://{{prism-central-ip}}:9440/api/nutanix/v3
          - https://{{prism-central-ip}}:9440/api
          - https://{{cluster-ip}}:9440/PrismGateway/services/rest/v2.0
          - https://api.nutanix.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 90-day evaluation license
      - name: Test Drive hosted lab
      - name: Community Edition (CE) for personal use
      - name: All Prism APIs included
  - id: nutanix-nci
    name: Nutanix Cloud Infrastructure (NCI)
    type: enterprise
    description: Per-node / per-core licensed editions (Starter, Pro, Ultimate) covering compute, storage,
      virtualization, and AHV. Includes Prism Central API access. Pricing custom-quoted by Nutanix sales.
    entries:
      - label: Per-node / per-core license
        name: nci_license
        type: subscription
        metric: node
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Prism Central / Prism Element APIs
      - name: AHV hypervisor
      - name: Multi-edition (Starter / Pro / Ultimate)
      - name: Per-node licensing
  - id: nutanix-ncm
    name: Nutanix Cloud Manager (NCM)
    type: enterprise
    description: Add-on suite for self-service, intelligent ops, cost governance, and security. Per-VM
      or per-core licensing.
    entries:
      - label: Per-VM / per-core license
        name: ncm_license
        type: subscription
        metric: vm
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: NCM Self-Service API
      - name: Cost governance
      - name: Intelligent ops / X-Play
      - name: Security Central
  - id: nutanix-ndb
    name: Nutanix Database Service (NDB / Era)
    type: enterprise
    description: Database-as-a-service add-on for Postgres, SQL Server, Oracle, MySQL, MongoDB. Includes
      NDB API.
    entries:
      - label: Per-DB-VM license
        name: ndb_license
        type: subscription
        metric: database
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Nutanix Database Service API
      - name: Multi-database (Postgres, SQL Server, Oracle, MySQL, Mongo)
      - name: Patch / clone / refresh automation
  - id: nutanix-nc2
    name: Nutanix Cloud Clusters (NC2)
    type: usage-based
    description: Hosted on AWS or Azure, billed via the cloud marketplace; underlying cloud resources
      (EC2, EBS, network) plus Nutanix software metered hourly.
    entries:
      - label: Hourly Nutanix software fee on AWS/Azure
        name: nc2_hourly
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://api.nutanix.com
        unit: 1
        price: see AWS/Azure marketplace
        userMultiplied: false
      - label: Underlying cloud infrastructure
        name: nc2_cloud
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see AWS/Azure cloud rates
        userMultiplied: false
    elements:
      - name: Hourly metered software
      - name: AWS Nitro / Azure metal hosts
      - name: NC2 API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
