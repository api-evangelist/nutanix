naftiko: 1.0.0-alpha2
info:
  label: Nutanix Prism Central API v3 — Hosts
  description: 'Nutanix Prism Central API v3 — Hosts. 2 operations. Lead operation: Nutanix List hosts. Self-contained Naftiko
    capability covering one Nutanix business surface.'
  tags:
  - Nutanix
  - Hosts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUTANIX_API_KEY: NUTANIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: prism-central-v3-hosts
    baseUri: https://{prismCentralIp}:9440/api/nutanix/v3
    description: Nutanix Prism Central API v3 — Hosts business capability. Self-contained, no shared references.
    resources:
    - name: hosts-list
      path: /hosts/list
      operations:
      - name: listhosts
        method: POST
        description: Nutanix List hosts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: hosts-uuid
      path: /hosts/{uuid}
      operations:
      - name: gethost
        method: GET
        description: Nutanix Get a host
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.NUTANIX_USER}}'
      password: '{{env.NUTANIX_PASS}}'
  exposes:
  - type: rest
    namespace: prism-central-v3-hosts-rest
    port: 8080
    description: REST adapter for Nutanix Prism Central API v3 — Hosts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/hosts/list
      name: hosts-list
      description: REST surface for hosts-list.
      operations:
      - method: POST
        name: listhosts
        description: Nutanix List hosts
        call: prism-central-v3-hosts.listhosts
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hosts/{uuid}
      name: hosts-uuid
      description: REST surface for hosts-uuid.
      operations:
      - method: GET
        name: gethost
        description: Nutanix Get a host
        call: prism-central-v3-hosts.gethost
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prism-central-v3-hosts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Nutanix Prism Central API v3 — Hosts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: nutanix-list-hosts
      description: Nutanix List hosts
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: prism-central-v3-hosts.listhosts
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: nutanix-get-host
      description: Nutanix Get a host
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prism-central-v3-hosts.gethost
      outputParameters:
      - type: object
        mapping: $.
