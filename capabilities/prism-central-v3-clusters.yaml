naftiko: 1.0.0-alpha2
info:
  label: Nutanix Prism Central API v3 — Clusters
  description: 'Nutanix Prism Central API v3 — Clusters. 2 operations. Lead operation: Nutanix List clusters. Self-contained
    Naftiko capability covering one Nutanix business surface.'
  tags:
  - Nutanix
  - Clusters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUTANIX_API_KEY: NUTANIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: prism-central-v3-clusters
    baseUri: https://{prismCentralIp}:9440/api/nutanix/v3
    description: Nutanix Prism Central API v3 — Clusters business capability. Self-contained, no shared references.
    resources:
    - name: clusters-list
      path: /clusters/list
      operations:
      - name: listclusters
        method: POST
        description: Nutanix List clusters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: clusters-uuid
      path: /clusters/{uuid}
      operations:
      - name: getcluster
        method: GET
        description: Nutanix Get a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.NUTANIX_USER}}'
      password: '{{env.NUTANIX_PASS}}'
  exposes:
  - type: rest
    namespace: prism-central-v3-clusters-rest
    port: 8080
    description: REST adapter for Nutanix Prism Central API v3 — Clusters. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/clusters/list
      name: clusters-list
      description: REST surface for clusters-list.
      operations:
      - method: POST
        name: listclusters
        description: Nutanix List clusters
        call: prism-central-v3-clusters.listclusters
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/clusters/{uuid}
      name: clusters-uuid
      description: REST surface for clusters-uuid.
      operations:
      - method: GET
        name: getcluster
        description: Nutanix Get a cluster
        call: prism-central-v3-clusters.getcluster
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prism-central-v3-clusters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Nutanix Prism Central API v3 — Clusters. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: nutanix-list-clusters
      description: Nutanix List clusters
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: prism-central-v3-clusters.listclusters
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: nutanix-get-cluster
      description: Nutanix Get a cluster
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prism-central-v3-clusters.getcluster
      outputParameters:
      - type: object
        mapping: $.
