naftiko: 1.0.0-alpha2
info:
  label: Nutanix Prism Central API v3 — Images
  description: 'Nutanix Prism Central API v3 — Images. 4 operations. Lead operation: Nutanix Create an image. Self-contained
    Naftiko capability covering one Nutanix business surface.'
  tags:
  - Nutanix
  - Images
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUTANIX_API_KEY: NUTANIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: prism-central-v3-images
    baseUri: https://{prismCentralIp}:9440/api/nutanix/v3
    description: Nutanix Prism Central API v3 — Images business capability. Self-contained, no shared references.
    resources:
    - name: images
      path: /images
      operations:
      - name: createimage
        method: POST
        description: Nutanix Create an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: images-list
      path: /images/list
      operations:
      - name: listimages
        method: POST
        description: Nutanix List images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: images-uuid
      path: /images/{uuid}
      operations:
      - name: getimage
        method: GET
        description: Nutanix Get an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteimage
        method: DELETE
        description: Nutanix Delete an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.NUTANIX_USER}}'
      password: '{{env.NUTANIX_PASS}}'
  exposes:
  - type: rest
    namespace: prism-central-v3-images-rest
    port: 8080
    description: REST adapter for Nutanix Prism Central API v3 — Images. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/images
      name: images
      description: REST surface for images.
      operations:
      - method: POST
        name: createimage
        description: Nutanix Create an image
        call: prism-central-v3-images.createimage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/images/list
      name: images-list
      description: REST surface for images-list.
      operations:
      - method: POST
        name: listimages
        description: Nutanix List images
        call: prism-central-v3-images.listimages
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/images/{uuid}
      name: images-uuid
      description: REST surface for images-uuid.
      operations:
      - method: GET
        name: getimage
        description: Nutanix Get an image
        call: prism-central-v3-images.getimage
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteimage
        description: Nutanix Delete an image
        call: prism-central-v3-images.deleteimage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prism-central-v3-images-mcp
    port: 9090
    transport: http
    description: MCP adapter for Nutanix Prism Central API v3 — Images. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: nutanix-create-image
      description: Nutanix Create an image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: prism-central-v3-images.createimage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: nutanix-list-images
      description: Nutanix List images
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: prism-central-v3-images.listimages
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: nutanix-get-image
      description: Nutanix Get an image
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prism-central-v3-images.getimage
      outputParameters:
      - type: object
        mapping: $.
    - name: nutanix-delete-image
      description: Nutanix Delete an image
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: prism-central-v3-images.deleteimage
      outputParameters:
      - type: object
        mapping: $.
