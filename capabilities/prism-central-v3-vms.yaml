    resources:
    - name: vms
      path: /vms
      operations:
      - name: createvm
        method: POST
        description: Nutanix Create a virtual machine
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: vms-list
