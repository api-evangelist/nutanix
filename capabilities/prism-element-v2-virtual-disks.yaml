naftiko: 1.0.0-alpha2
info:
  label: Nutanix Prism Element API v2 — Virtual Disks
  description: 'Nutanix Prism Element API v2 — Virtual Disks. 1 operations. Lead operation: Nutanix List virtual disks. Self-contained
    Naftiko capability covering one Nutanix business surface.'
  tags:
  - Nutanix
  - Virtual Disks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUTANIX_API_KEY: NUTANIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: prism-element-v2-virtual-disks
    baseUri: https://{clusterIp}:9440/PrismGateway/services/rest/v2.0
    description: Nutanix Prism Element API v2 — Virtual Disks business capability. Self-contained, no shared references.
    resources:
    - name: virtual_disks
      path: /virtual_disks
      operations:
      - name: listvirtualdisks
        method: GET
        description: Nutanix List virtual disks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.NUTANIX_USER}}'
      password: '{{env.NUTANIX_PASS}}'
  exposes:
  - type: rest
    namespace: prism-element-v2-virtual-disks-rest
    port: 8080
    description: REST adapter for Nutanix Prism Element API v2 — Virtual Disks. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/virtual-disks
      name: virtual-disks
      description: REST surface for virtual_disks.
      operations:
      - method: GET
        name: listvirtualdisks
        description: Nutanix List virtual disks
        call: prism-element-v2-virtual-disks.listvirtualdisks
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prism-element-v2-virtual-disks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Nutanix Prism Element API v2 — Virtual Disks. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: nutanix-list-virtual-disks
      description: Nutanix List virtual disks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prism-element-v2-virtual-disks.listvirtualdisks
      outputParameters:
      - type: object
        mapping: $.
