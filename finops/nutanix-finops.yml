    serviceName: Nutanix Prism Element API V2
    serviceCategory: Cluster Management
  - name: Nutanix Karbon API
    baseURL: ''
    tags:
      - Container Management
      - Kubernetes
    serviceName: Nutanix Karbon API
    serviceCategory: Container Management
  - name: Nutanix Database Service API
    baseURL: ''
    tags:
      - Database
      - DBaaS
    serviceName: Nutanix Database Service API
    serviceCategory: Database
  - name: Nutanix Cloud Clusters API
    baseURL: https://api.nutanix.com
    tags:
      - AWS
      - Azure
