specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Nutanix
providerId: nutanix
publisherName: Nutanix, Inc.
serviceCategory: Hybrid Cloud Infrastructure
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud Management
  - Hyperconverged
  - Infrastructure
  - Virtualization
  - Kubernetes
  - Database
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Nutanix: per-node / per-core software subscription bundled with
  on-prem hardware, plus hourly metered NC2 in AWS/Azure cloud marketplaces. APIs are included with the
  license. Cost governance is provided by Nutanix Cloud Manager (NCM) Cost Governance.'
sources:
  - https://www.nutanix.com/products/cloud-platform
  - https://www.nutanix.com/products/cloud-manager
  - https://www.nutanix.com/products/cloud-clusters
principles:
  - name: Visibility
    description: Use NCM Cost Governance (formerly Beam) to see consumption and chargeback across on-prem
      Nutanix clusters and NC2 cloud spend. Pull NC2 billing from AWS Cost Explorer / Azure Cost Management
      via FOCUS-aligned exports; pull on-prem usage from Prism Central.
  - name: Allocation
    description: Tag VMs and projects in Prism Central / NCM Self-Service for chargeback. Use NC2 cloud
      tags to allocate AWS/Azure infrastructure spend back to consuming teams.
  - name: Optimization
    description: Use NCM Cost Governance recommendations to right-size VMs, identify idle resources, and
      optimize NC2 footprint. Burst into NC2 only when on-prem capacity is exhausted; run baseline in
      lower-cost on-prem.
  - name: Accountability
    description: 'Establish per-business-unit chargeback via NCM. Assign owners for: on-prem cluster utilization,
      NC2 cloud spend, and NDB database sprawl. Review monthly.'
billingModel:
  pricingCategory: Subscription (Per-Node) + Marketplace Hourly
  billingFrequency: Annual (subscription) or Hourly (NC2 via cloud)
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Nutanix
  ServiceCategory: Hybrid Cloud Infrastructure
  ProviderName: Nutanix
  PublisherName: Nutanix, Inc.
  InvoiceIssuerName: Nutanix, Inc. (or AWS/Azure for NC2 marketplace)
  PricingCategory: Subscription
  PricingUnit: node
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: nci_node_subscription
    description: Per-node Nutanix Cloud Infrastructure subscription
    unit: node
    aggregation: sum
    dimensions:
      - edition
      - cluster
      - region
  - name: nci_core_subscription
    description: Per-core Nutanix Cloud Infrastructure subscription (capacity-based licensing)
    unit: core
    aggregation: sum
    dimensions:
      - edition
      - cluster
  - name: ncm_vm_subscription
    description: Per-VM or per-core NCM (Cloud Manager) subscription
    unit: vm
    aggregation: sum
    dimensions:
      - product
      - cluster
  - name: ndb_db_subscription
    description: Per-database Nutanix Database Service subscription
    unit: database
    aggregation: sum
    dimensions:
      - engine
      - cluster
  - name: nc2_software_hours
    description: Hourly Nutanix software meter on NC2 (AWS/Azure)
    unit: instance-hour
    aggregation: sum
    dimensions:
      - cloud
      - region
      - instance_type
  - name: nc2_cloud_infra
    description: Underlying cloud-provider infrastructure consumed by NC2
    unit: instance-hour
    aggregation: sum
    dimensions:
      - cloud
      - region
      - instance_type
apis:
  - name: Nutanix Prism Central API V3
    baseURL: https://{{prism-central-ip}}:9440/api/nutanix/v3
    tags:
