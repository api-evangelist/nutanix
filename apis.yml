- name: Nutanix Move API
  description: >-
    REST API for Nutanix Move, a cross-hypervisor mobility solution that automates VM migrations with lift-and-shift capabilities. The API enables programmatic control over migration plans, source and target provider configuration, and workload migration from VMware, AWS, Azure, and Hyper-V to Nutanix AHV.
  image: https://www.nutanix.com/content/dam/nutanix/global/logos/nutanix-logo.svg
  humanURL: https://www.nutanix.dev/api_reference/apis/move.html
