- name: Nutanix Foundation API
  description: >-
    REST API for Nutanix Foundation, the core cluster deployment tool used to streamline the deployment of new and rebuilt Nutanix clusters. Foundation enables automated imaging, configuration, and creation of Nutanix clusters from bare-metal nodes.
