- name: Nutanix Foundation Central API
  description: >-
    REST API for Foundation Central, enabling remote cluster creation from factory-imaged nodes and node re-imaging via Prism Central. Foundation Central allows administrators to deploy and manage clusters at remote sites without requiring on-site personnel.
