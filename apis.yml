- name: Nutanix Enterprise AI API
  description: >-
    REST API for Nutanix Enterprise AI (NAI), providing private and centralized inferencing for large language models. The inference APIs are compliant with OpenAI API specifications and support text generation, embeddings, image generation, and reranking operations with API key authentication.
