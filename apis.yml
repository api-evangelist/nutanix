- name: Nutanix Cloud Clusters API
  description: >-
    REST API for Nutanix Cloud Clusters (NC2), enabling creation and management of Nutanix clusters on AWS and Azure public clouds. The v2 API supports cluster lifecycle operations including creation, termination, hibernation, and resumption, using JWT-based authentication with MyNutanix API keys.
