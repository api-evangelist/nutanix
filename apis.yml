name: Nutanix
description: Nutanix is a hyper-converged infrastructure solution that integrates compute, virtualization, storage, networking, and security to power enterprise applications. This APIs.json file provides information about Nutanix's public APIs for managing and automating infrastructure.
image: https://www.nutanix.com/content/dam/nutanix/global/logos/nutanix-logo.svg
url: https://www.nutanix.com
