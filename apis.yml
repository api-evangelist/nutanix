- name: Nutanix Database Service API
  description: >-
    REST API for Nutanix Database Service (formerly Era), providing database-as-a-service capabilities that automate database provisioning, cloning, patching, and lifecycle management. Supports PostgreSQL, MySQL, Microsoft SQL Server, Oracle, and MongoDB across on-premises and public cloud environments.
