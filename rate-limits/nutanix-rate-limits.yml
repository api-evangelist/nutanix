specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Nutanix
providerId: nutanix
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Management
  - Hyperconverged
  - Infrastructure
  - Virtualization
  - Kubernetes
  - Database
  - Rate Limiting
description: Nutanix APIs (Prism Central v3/v4, Prism Element v2, Karbon, NDB, NC2, NCM Self-Service,
  Foundation) are deployed within customer-controlled clusters and do not have public per-tier rate limits.
  Throughput is bounded by the cluster's CPU/memory/network and Prism Central's task queue. Long-running
  operations are returned as task UUIDs for asynchronous polling. Public docs do not publish numeric per-second
  ceilings.
notes: Per-API numeric rate limits are not publicly documented; clients should pace requests against
  cluster capacity and use task-based polling. Update if Nutanix publishes specific limits.
sources:
  - https://www.nutanix.dev/
  - https://docs.api.nutanix.com/
responseCodes:
  unauthorized: 401
  forbidden: 403
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Prism Central / Prism Element
    scope: cluster
    metric: varies
    limit: cluster-bounded; not numerically published. Use task-based polling for long ops.
    applies:
      - Nutanix Prism Central API V3
      - Nutanix Prism Central API V4
      - Nutanix Prism Element API V2
  - name: NCM Self-Service / Karbon / NDB / Foundation
    scope: cluster
    metric: varies
    limit: cluster-bounded; defer to product-specific docs
    applies:
      - Nutanix Karbon API
      - Nutanix Database Service API
      - Nutanix NCM Self-Service API
      - Nutanix Foundation API
  - name: Nutanix Cloud Clusters (NC2)
    scope: tenant
    metric: varies
    limit: see Nutanix portal documentation
    applies:
      - Nutanix Cloud Clusters API
policies:
  - name: Async tasks
    description: Most write operations on Prism return a task UUID; clients should poll the tasks endpoint
      for completion rather than blocking on the request.
  - name: Authentication
    description: Prism uses Basic auth or API key over HTTPS; v4 supports key-based auth via Prism Central
      service accounts.
  - name: Backoff
    description: Implement exponential backoff with jitter on 429/503 and respect Retry-After when present.
  - name: Cluster capacity
    description: Effective rate is bounded by the cluster's CPU and Prism Central scheduler; sustained
      heavy automation should batch and pace requests.
maintainers:
